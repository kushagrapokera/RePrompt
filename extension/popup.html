<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RePrompt</title>
  <style>
    body { width: 220px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 16px; margin: 0; background: #f9fafb; color: #1f2937; }
    h2 { font-size: 16px; margin: 0 0 4px 0; display: flex; align-items: center; gap: 6px; }
    p { font-size: 13px; margin: 0 0 12px 0; color: #6b7280; }
    .status-row { display: flex; align-items: center; gap: 8px; font-size: 13px; margin-bottom: 12px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .dot.green { background: #22c55e; }
    .dot.red { background: #ef4444; }
    .dot.gray { background: #9ca3af; }
    a { color: #6366f1; text-decoration: none; font-size: 13px; cursor: pointer; }
    a:hover { text-decoration: underline; }
    .footer { border-top: 1px solid #e5e7eb; padding-top: 10px; margin-top: 4px; display: flex; justify-content: space-between; }
  </style>
</head>
<body>
  <h2>✨ RePrompt</h2>
  <p>Prompt enhancement active</p>
  <div class="status-row">
    <span class="dot gray" id="statusDot"></span>
    <span id="statusText">Checking server...</span>
  </div>
  <div class="footer">
    <a href="#" id="optionsLink">Settings</a>
    <span style="color:#9ca3af;font-size:11px;">v1.0.0</span>
  </div>
  <script src="popup.js"></script>
</body>
</html>
