<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RePrompt Options</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 24px; max-width: 500px; margin: 0 auto; background: #f9fafb; color: #1f2937; }
    h1 { font-size: 22px; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
    h1 span { font-size: 24px; }
    p.sub { color: #6b7280; font-size: 14px; margin-top: 0; margin-bottom: 24px; }
    label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 14px; }
    input[type="text"] { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
    input[type="text"]:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
    .field { margin-bottom: 16px; }
    button { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-primary { background: #6366f1; color: #fff; }
    .btn-primary:hover { background: #4f46e5; }
    .btn-secondary { background: #e5e7eb; color: #374151; }
    .btn-secondary:hover { background: #d1d5db; }
    .btn-row { display: flex; gap: 8px; margin-top: 20px; }
    #status { margin-top: 12px; font-size: 13px; padding: 8px 12px; border-radius: 6px; display: none; }
    #status.success { display: block; background: #dcfce7; color: #16a34a; }
    #status.error { display: block; background: #fee2e2; color: #dc2626; }
    #conn-status { display: flex; align-items: center; gap: 6px; margin-top: 16px; font-size: 13px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .dot.green { background: #22c55e; }
    .dot.red { background: #ef4444; }
    .dot.gray { background: #9ca3af; }
  </style>
</head>
<body>
  <h1><span>✨</span> RePrompt Settings</h1>
  <p class="sub">Configure how the extension connects to your local RePrompt server.</p>

  <div class="field">
    <label for="backendUrl">Backend Server URL</label>
    <input type="text" id="backendUrl" placeholder="http://127.0.0.1:8787" />
  </div>

  <div id="conn-status">
    <span class="dot gray" id="conn-dot"></span>
    <span id="conn-text">Not checked</span>
  </div>

  <div class="btn-row">
    <button class="btn-secondary" id="testBtn">Test Connection</button>
    <button class="btn-primary" id="saveBtn">Save</button>
  </div>

  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
